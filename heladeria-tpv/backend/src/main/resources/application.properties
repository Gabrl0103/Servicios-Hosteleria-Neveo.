spring.application.name=heladeria-tpv

server.port=8080

# Ruta de la base de datos SQLite.
# APP_DATA_DIR se pasa como variable de entorno desde Electron,
# apuntando a una carpeta persistente del usuario (ej: %APPDATA%/heladeria-tpv).
# Si no esta definida (ej: corriendo el backend solo, para pruebas), se usa una carpeta local.
spring.datasource.url=jdbc:sqlite:${APP_DATA_DIR:.}/heladeria.db
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# SQLite no soporta bien el pool de conexiones por defecto de Spring (HikariCP)
# con varias conexiones simultaneas, asi que se limita a una sola conexion.
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-init-sql=PRAGMA journal_mode=WAL; PRAGMA busy_timeout=3000;

spring.jackson.time-zone=America/Bogota

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
server.tomcat.max-http-post-size=5242880
